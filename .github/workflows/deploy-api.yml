name: Test & Build API

on:
  push:
    branches: [main]
    paths: ['api/**']
  pull_request:
    paths: ['api/**']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: api

      - name: Run tests
        run: npm test
        working-directory: api

      - name: Type check
        run: npx tsc --noEmit
        working-directory: api

      - name: Build
        run: npm run build
        working-directory: api