name: OWASP ZAP DAST Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # 매주 화요일 오전 3시 (UTC) 정기 스캔
    - cron: '0 3 * * 2'
  workflow_dispatch:

jobs:
  zap-scan:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      issues: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: api/package-lock.json

    - name: Install API dependencies
      run: npm ci
      working-directory: api

    - name: Start WCMS API server in background
      working-directory: api
      env:
        PORT: 5050
        WCMS_SECRET_KEY: ci-test-secret-key-not-for-production
        WCMS_DB_PATH: /tmp/wcms_ci_test.db
      run: |
        npm start > /tmp/wcms_server.log 2>&1 &
        echo "SERVER_PID=$!" >> $GITHUB_ENV

    - name: Wait for server to be ready
      run: |
        echo "서버 시작 대기 중..."
        for i in $(seq 1 30); do
          if curl -s -o /dev/null -w "%{http_code}" http://localhost:5050/health | grep -q "200"; then
            echo "서버 준비 완료 (시도 $i)"
            exit 0
          fi
          echo "대기 중... ($i/30)"
          sleep 2
        done
        echo "=== 서버 시작 실패 - 서버 로그 ==="
        cat /tmp/wcms_server.log || true
        exit 1

    - name: Run OWASP ZAP Baseline Scan
      continue-on-error: true
      uses: zaproxy/action-baseline@v0.14.0
      with:
        target: 'http://localhost:5050'
        rules_file_name: '.github/zap-rules.tsv'
        cmd_options: '-I'
        artifact_name: 'zap-scan-report'

    - name: Show server logs on failure
      if: failure()
      run: cat /tmp/wcms_server.log || echo "서버 로그 없음"

    - name: Upload ZAP report as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: zap-scan-report-${{ github.run_number }}
        path: |
          report_html.html
          report_json.json
        retention-days: 30